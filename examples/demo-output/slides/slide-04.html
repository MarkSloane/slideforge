<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: radial-gradient(ellipse at center, #f0f0f0 0%, #d8d8d8 100%);
  font-family: 'Inter', sans-serif;
  display: flex; align-items: center; justify-content: center;
}
.container { width: 85vw; }
.heading {
  font-size: 2vw; font-weight: 600; color: #1a1a2e; margin-bottom: 1vh;
  opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
}
.accent-line {
  width: 5vw; height: 0.3vh;
  background: linear-gradient(90deg, #e94560, #c23152);
  margin-bottom: 1.5vh; transform-origin: left;
  opacity: 0; animation: scaleIn 0.5s cubic-bezier(0.16,1,0.3,1) 1.3s forwards;
}
.sub-heading {
  font-size: 1.1vw; font-weight: 400; color: #6b7280; margin-bottom: 4vh;
  opacity: 0; animation: fadeSlideUp 0.8s cubic-bezier(0.16,1,0.3,1) 1.4s forwards;
}
.cards { display: flex; gap: 2vw; }
.card {
  flex: 1; background: rgba(255,255,255,0.7);
  border: 0.1vw solid rgba(0,0,0,0.08); border-radius: 0.8vw;
  padding: 3.5vh 2vw; text-align: center;
  opacity: 0; animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.card:nth-child(1) { animation-delay: 1.6s; }
.card:nth-child(2) { animation-delay: 1.9s; }
.card:nth-child(3) { animation-delay: 2.2s; }
.card .stat {
  font-size: 4.2vw; font-weight: 700; color: #e94560; line-height: 1;
}
.card .label {
  font-size: 0.95vw; font-weight: 400; color: #6b7280;
  margin-top: 1.2vh; max-width: 18vw; margin-left: auto; margin-right: auto;
}
.card .context {
  font-size: 0.8vw; font-weight: 500; color: #1a1a2e;
  margin-top: 0.8vh;
  opacity: 0.7;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(2vh); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scaleX(0); }
  to   { opacity: 1; transform: scaleX(1); }
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.8); }
  to   { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>
<div class="container">
  <div class="heading">Infrastructure cost savings</div>
  <div class="accent-line"></div>
  <div class="sub-heading">Year-over-year efficiency gains</div>
  <div class="cards">
    <div class="card">
      <div class="stat">38%</div>
      <div class="label">Compute reduction</div>
      <div class="context">Optimized query engine</div>
    </div>
    <div class="card">
      <div class="stat">52%</div>
      <div class="label">Storage savings</div>
      <div class="context">Deduplication + compression</div>
    </div>
    <div class="card">
      <div class="stat">$2.9M</div>
      <div class="label">Annualized savings</div>
      <div class="context">Projected full-year impact</div>
    </div>
  </div>
</div>
</body>
</html>
